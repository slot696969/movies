<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Custom Video Compressor</title>
    <style>
        body { font-family: Arial, sans-serif; background: #121212; color: #fff; max-width: 600px; margin: 50px auto; padding: 20px; }
        .card { background: #1e1e1e; padding: 30px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; }
        input, select, button { width: 100%; padding: 12px; border-radius: 4px; border: none; box-sizing: border-box; }
        input[type="file"], select { background: #333; color: white; }
        input[type="number"] { background: #333; color: white; }
        button { background: #00adb5; color: white; font-size: 16px; cursor: pointer; font-weight: bold; }
        button:hover { background: #008c9e; }
        #status { margin-top: 20px; text-align: center; color: #00adb5; font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <h2>🎬 Custom Video Compressor</h2>
    <hr style="border-color:#333; margin-bottom:20px;">
    
    <form id="uploadForm">
        <div class="form-group">
            <label>Select Movie File (Up to 10GB+):</label>
            <input type="file" id="videoFile" accept="video/*" required>
        </div>

        <div class="form-group">
            <label>Target File Size (MB):</label>
            <input type="number" id="targetSize" placeholder="e.g., 500 or 1000" min="10" required>
        </div>

        <div class="form-group">
            <label>Target Resolution (Optional):</label>
            <select id="resolution">
                <option value="no-change">Keep Original Resolution</option>
                <option value="256:144">144p (Very Low Quality)</option>
                <option value="640:360">360p (Low Quality)</option>
                <option value="854:480">480p (Standard SD)</option>
                <option value="1280:720">720p (HD)</option>
            </select>
        </div>

        <button type="submit">Start Compression</button>
    </form>

    <div id="status"></div>
</div>

<script>
    document.getElementById('uploadForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const fileInput = document.getElementById('videoFile');
        const targetSize = document.getElementById('targetSize').value;
        const resolution = document.getElementById('resolution').value;
        const statusDiv = document.getElementById('status');

        if (!fileInput.files.length) return alert("Please select a file!");

        const formData = new FormData();
        formData.append('video', fileInput.files[0]);
        formData.append('targetSizeMB', targetSize);
        formData.append('resolution', resolution);

        statusDiv.innerText = "🚀 Uploading and compressing your file... Please wait (This might take a while for large movies).";

        try {
            const response = await fetch('http://localhost:3000/compress', {
                method: 'POST',
                body: formData
            });

            if (!response.ok) throw new Error('Compression failed');

            // Trigger file download automatically when backend finishes
            const blob = await response.blob();
            const downloadUrl = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = downloadUrl;
            a.download = "compressed_" + fileInput.files[0].name;
            document.body.appendChild(a);
            a.click();
            a.remove();
            
            statusDiv.innerText = "✅ Compression Complete! Your download has started.";
        } catch (error) {
            statusDiv.innerText = "❌ Error compressing video. Check server logs.";
            console.error(error);
        }
    });
</script>
</body>
</html>
