<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineHub - Premium Media Library</title>
    <!-- Tailwind CSS for modern styling -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        /* Smooth High-End RGB Neon Background Animation */
        @keyframes rgbGradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .animated-rgb-bg {
            background: linear-gradient(-45deg, #0f172a, #1e1b4b, #2e1065, #3b0764, #0f172a);
            background-size: 400% 400%;
            animation: rgbGradient 15s ease infinite;
        }
        .glass-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
    </style>
</head>
<body class="animated-rgb-bg text-gray-100 min-h-screen font-sans antialiased">

    <!-- Header & Navigation -->
    <header class="bg-slate-900/80 backdrop-blur-md border-b border-slate-700/50 sticky top-0 z-50 p-4 shadow-2xl">
        <div class="max-w-7xl mx-auto flex flex-col lg:flex-row items-center justify-between gap-6">
            
            <!-- Left Side: App Logo & Controls -->
            <div class="flex flex-col md:flex-row items-center gap-6 w-full lg:w-auto flex-1">
                <h1 class="text-3xl font-black text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 via-purple-400 to-pink-400 tracking-wider whitespace-nowrap drop-shadow-sm">🎬 CineHub</h1>
                
                <div class="flex flex-col sm:flex-row items-center gap-4 w-full">
                    <input 
                        type="text" 
                        id="searchBar" 
                        placeholder="Search assets..." 
                        class="w-full md:max-w-md bg-slate-800/90 text-white placeholder-slate-400 rounded-xl px-5 py-3 text-base focus:outline-none focus:ring-2 focus:ring-purple-500 border border-slate-600/60 shadow-inner"
                    >
                    <select 
                        id="genreFilter" 
                        class="w-full sm:w-56 bg-slate-800/90 text-white rounded-xl px-4 py-3 text-base focus:outline-none focus:ring-2 focus:ring-purple-500 border border-slate-600/60 cursor-pointer shadow-inner"
                    >
                        <option value="all">All Genres / Types</option>
                        <option value="Romantic">Romantic</option>
                        <option value="Psycho">Psycho</option>
                        <option value="Comedy">Comedy</option>
                        <option value="Action">Action</option>
                        <option value="Drama">Drama</option>
                        <option value="Tools">Tools (APK)</option>
                        <option value="Games">Games (APK)</option>
                        <option value="Pop">Pop (Music)</option>
                        <option value="Rock">Rock (Music)</option>
                        <option value="Lo-Fi">Lo-Fi (Music)</option>
                    </select>
                </div>
            </div>
            
            <!-- Library Module Switcher -->
            <div class="flex gap-2 p-1 bg-slate-950/60 border border-slate-700/50 rounded-xl">
                <button id="tab-movies" onclick="switchLibraryTab('movies')" class="px-4 py-2 rounded-lg text-sm font-bold bg-purple-600 text-white shadow transition-all cursor-pointer">Movies</button>
                <button id="tab-apks" onclick="switchLibraryTab('apks')" class="px-4 py-2 rounded-lg text-sm font-bold text-slate-400 hover:text-white transition-all cursor-pointer">APKs</button>
                <button id="tab-music" onclick="switchLibraryTab('music')" class="px-4 py-2 rounded-lg text-sm font-bold text-slate-400 hover:text-white transition-all cursor-pointer">Music</button>
            </div>
            
            <!-- Right Side: Compact Admin Controls Area -->
            <div class="flex items-center gap-2 justify-end w-full lg:w-auto border-t lg:border-t-0 border-slate-700/50 pt-4 lg:pt-0">
                <span id="roleBadge" class="bg-slate-800 text-[10px] text-slate-400 font-medium px-2 py-0.5 rounded border border-slate-700 whitespace-nowrap">Guest Mode</span>
                <button 
                    id="authBtn" 
                    class="bg-purple-600 hover:bg-purple-500 text-xs font-semibold py-1.5 px-3 rounded-lg transition-all whitespace-nowrap cursor-pointer shadow-md"
                >
                    Admin Login
                </button>
            </div>
        </div>
    </header>

    <!-- Admin Login Modal -->
    <div id="loginModal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-50 p-4 backdrop-blur-md">
        <div class="bg-slate-900 border border-slate-700/60 p-6 rounded-2xl shadow-2xl w-full max-w-sm">
            <h3 class="text-lg font-bold text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-pink-400 mb-4">Admin Authentication</h3>
            <div class="space-y-3">
                <div>
                    <label class="block text-xs font-medium text-slate-400 mb-1">Admin ID</label>
                    <input type="text" id="adminId" class="w-full bg-slate-800 rounded-lg px-3 py-2 text-white border border-slate-700 focus:outline-none focus:ring-2 focus:ring-purple-500">
                </div>
                <div>
                    <label class="block text-xs font-medium text-slate-400 mb-1">Password</label>
                    <input type="password" id="adminPassword" class="w-full bg-slate-800 rounded-lg px-3 py-2 text-white border border-slate-700 focus:outline-none focus:ring-2 focus:ring-purple-500">
                </div>
                <p id="loginError" class="text-xs text-rose-400 hidden">Invalid ID or Password!</p>
                <div class="flex justify-end gap-2 pt-2">
                    <button id="closeModalBtn" class="bg-slate-800 hover:bg-slate-700 text-sm px-4 py-2 rounded-lg cursor-pointer">Cancel</button>
                    <button id="submitLoginBtn" class="bg-purple-600 hover:bg-purple-500 text-sm px-4 py-2 rounded-lg font-bold cursor-pointer">Login</button>
                </div>
            </div>
        </div>
    </div>

    <main class="max-w-7xl mx-auto p-4 md:p-8 space-y-8">
        
        <!-- Upload Section (Visible to Admin Only) -->
        <section id="adminUploadSection" class="hidden glass-card p-6 rounded-2xl border border-purple-500/30 shadow-2xl">
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 gap-4">
                <h2 class="text-xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-amber-400 to-purple-400 flex items-center gap-2">
                    <span>⚡ Admin Control Panel</span>
                </h2>
                <!-- Admin Upload Sub-tabs Switcher -->
                <div class="flex bg-slate-950/40 p-1 border border-slate-700/60 rounded-xl">
                    <button type="button" onclick="setUploadType('movies')" id="upload-tab-movies" class="px-3 py-1.5 rounded-lg text-xs font-bold bg-purple-600 text-white transition-all cursor-pointer">Upload Movie</button>
                    <button type="button" onclick="setUploadType('apks')" id="upload-tab-apks" class="px-3 py-1.5 rounded-lg text-xs font-bold text-slate-400 hover:text-white transition-all cursor-pointer">Upload APK</button>
                    <button type="button" onclick="setUploadType('music')" id="upload-tab-music" class="px-3 py-1.5 rounded-lg text-xs font-bold text-slate-400 hover:text-white transition-all cursor-pointer">Upload Music</button>
                </div>
            </div>

            <form id="uploadForm" class="grid grid-cols-1 md:grid-cols-4 gap-4 items-end">
                <div class="md:col-span-1">
                    <label id="nameLabel" class="block text-sm font-semibold text-slate-300 mb-1">Movie Name</label>
                    <input type="text" id="assetName" required placeholder="Title" class="w-full bg-slate-800/90 text-white rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-purple-500 border border-slate-700">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-300 mb-1">Genre / Tag</label>
                    <select id="assetGenre" required class="w-full bg-slate-800/90 text-white rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-purple-500 border border-slate-700">
                        <option value="Romantic">Romantic</option>
                        <option value="Psycho">Psycho</option>
                        <option value="Comedy">Comedy</option>
                        <option value="Action">Action</option>
                        <option value="Drama">Drama</option>
                    </select>
                </div>
                <div>
                    <label id="fileLabel" class="block text-sm font-semibold text-slate-300 mb-1">Video File</label>
                    <input type="file" id="assetFile" accept="video/*" required class="w-full text-xs text-slate-400 file:mr-3 file:py-2 file:px-3 file:rounded-lg file:border-0 file:text-xs file:font-bold file:bg-purple-600 file:text-white hover:file:bg-purple-500 file:transition-all cursor-pointer">
                </div>
                <button type="submit" id="submitBtn" class="bg-gradient-to-r from-emerald-600 to-teal-600 hover:from-emerald-500 hover:to-teal-500 text-white font-bold py-2 px-6 rounded-lg transition-all shadow-lg w-full disabled:from-slate-700 disabled:to-slate-700 disabled:cursor-not-allowed cursor-pointer">
                    Publish Movie
                </button>
            </form>
        </section>

        <!-- Dynamic Content Display Dashboard -->
        <section>
            <div id="assetGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <!-- Dynamic component cards populated asynchronously by JavaScript -->
            </div>
            <div id="noAssetsMessage" class="hidden text-center text-slate-500 py-20">
                <p class="text-xl font-medium">No files found fitting those parameters.</p>
            </div>
        </section>
    </main>

    <script>
        // DOM bindings
        const authBtn = document.getElementById('authBtn');
        const loginModal = document.getElementById('loginModal');
        const closeModalBtn = document.getElementById('closeModalBtn');
        const submitLoginBtn = document.getElementById('submitLoginBtn');
        const roleBadge = document.getElementById('roleBadge');
        const adminUploadSection = document.getElementById('adminUploadSection');
        const uploadForm = document.getElementById('uploadForm');
        const submitBtn = document.getElementById('submitBtn');
        const assetGrid = document.getElementById('assetGrid');
        const searchBar = document.getElementById('searchBar');
        const genreFilter = document.getElementById('genreFilter');
        const noAssetsMessage = document.getElementById('noAssetsMessage');

        // Form Label Context Variables
        const nameLabel = document.getElementById('nameLabel');
        const fileLabel = document.getElementById('fileLabel');
        const assetFile = document.getElementById('assetFile');
        const assetGenre = document.getElementById('assetGenre');

        // State Machine Storage
        let isAdmin = false;
        let currentTab = 'movies'; // Engine scope states: 'movies' | 'apks' | 'music'
        let currentUploadType = 'movies'; 
        
        // Data Store Buffers
        let videoLibrary = [];
        let apkLibrary = [];
        let musicLibrary = [];
        
        let db = null;
        let objectUrls = [];
        let likedItems = JSON.parse(localStorage.getItem('cinehub_liked_items')) || [];

        // Dynamic Genre Engine configurations mapping
        const genreMap = {
            movies: ['Romantic', 'Psycho', 'Comedy', 'Action', 'Drama'],
            apks: ['Tools', 'Games'],
            music: ['Pop', 'Rock', 'Lo-Fi']
        };

        // Assert Persistent Data Privileges
        if (navigator.storage && navigator.storage.persist) {
            navigator.storage.persist().then(granted => {
                if (granted) console.log("Persistent state storage locked.");
            });
        }

        // Initialize Scaled Database Architecture
        const dbName = "CineHubDatabase";
        const request = indexedDB.open(dbName, 2);

        request.onupgradeneeded = function(e) {
            db = e.target.result;
            if (!db.objectStoreNames.contains("movies")) {
                db.createObjectStore("movies", { keyPath: "id" });
            }
            if (!db.objectStoreNames.contains("apks")) {
                db.createObjectStore("apks", { keyPath: "id" });
            }
            if (!db.objectStoreNames.contains("music")) {
                db.createObjectStore("music", { keyPath: "id" });
            }
        };

        request.onsuccess = function(e) {
            db = e.target.result;
            loadAllLibraries();
        };

        request.onerror = function() {
            alert("Database interface down. Ensure client device grants sandbox storage privileges.");
        };

        function loadAllLibraries() {
            if (!db) return;
            let counter = 0;
            const checkAndRender = () => {
                counter++;
                if (counter === 3) applyFilters();
            };

            db.transaction(["movies"], "readonly").objectStore("movies").getAll().onsuccess = function(e) {
                videoLibrary = e.target.result || [];
                checkAndRender();
            };
            db.transaction(["apks"], "readonly").objectStore("apks").getAll().onsuccess = function(e) {
                apkLibrary = e.target.result || [];
                checkAndRender();
            };
            db.transaction(["music"], "readonly").objectStore("music").getAll().onsuccess = function(e) {
                musicLibrary = e.target.result || [];
                checkAndRender();
            };
        }

        window.switchLibraryTab = function(tabName) {
            currentTab = tabName;
            ['movies', 'apks', 'music'].forEach(t => {
                const btn = document.getElementById(`tab-${t}`);
                if (t === tabName) {
                    btn.className = "px-4 py-2 rounded-lg text-sm font-bold bg-purple-600 text-white shadow transition-all cursor-pointer";
                } else {
                    btn.className = "px-4 py-2 rounded-lg text-sm font-bold text-slate-400 hover:text-white transition-all cursor-pointer";
                }
            });
            applyFilters();
        };

        window.setUploadType = function(type) {
            currentUploadType = type;
            ['movies', 'apks', 'music'].forEach(t => {
                const btn = document.getElementById(`upload-tab-${t}`);
                if (t === type) {
                    btn.className = "px-3 py-1.5 rounded-lg text-xs font-bold bg-purple-600 text-white transition-all cursor-pointer";
                } else {
                    btn.className = "px-3 py-1.5 rounded-lg text-xs font-bold text-slate-400 hover:text-white transition-all cursor-pointer";
                }
            });

            if (type === 'movies') {
                nameLabel.innerText = "Movie Name";
                fileLabel.innerText = "Video File";
                assetFile.accept = "video/*";
                submitBtn.innerText = "Publish Movie";
            } else if (type === 'apks') {
                nameLabel.innerText = "Application Name";
                fileLabel.innerText = "Android Binary (APK)";
                assetFile.accept = ".apk";
                submitBtn.innerText = "Publish App Package";
            } else if (type === 'music') {
                nameLabel.innerText = "Track Name / Title";
                fileLabel.innerText = "Audio File";
                assetFile.accept = "audio/*";
                submitBtn.innerText = "Publish Track";
            }

            assetGenre.innerHTML = '';
            genreMap[type].forEach(g => {
                const opt = document.createElement('option');
                opt.value = g;
                opt.innerText = g;
                assetGenre.appendChild(opt);
            });
        };

        authBtn.addEventListener('click', () => {
            if (isAdmin) {
                isAdmin = false;
                authBtn.innerText = "Admin Login";
                authBtn.className = "bg-purple-600 hover:bg-purple-500 text-xs font-semibold py-1.5 px-3 rounded-lg transition-all whitespace-nowrap cursor-pointer shadow-md";
                roleBadge.innerText = "Guest Mode";
                roleBadge.className = "bg-slate-800 text-[10px] text-slate-400 font-medium px-2 py-0.5 rounded border border-slate-700 whitespace-nowrap";
                adminUploadSection.classList.add('hidden');
                applyFilters(); 
            } else {
                loginModal.classList.remove('hidden');
            }
        });

        closeModalBtn.addEventListener('click', () => {
            loginModal.classList.add('hidden');
            document.getElementById('loginError').classList.add('hidden');
        });

        submitLoginBtn.addEventListener('click', () => {
            const idInput = document.getElementById('adminId').value;
            const passInput = document.getElementById('adminPassword').value;

            if (idInput === "slot69" && passInput === "25801@Yeasin") {
                isAdmin = true;
                loginModal.classList.add('hidden');
                document.getElementById('adminId').value = '';
                document.getElementById('adminPassword').value = '';
                document.getElementById('loginError').classList.add('hidden');
                
                authBtn.innerText = "Log Out";
                authBtn.className = "bg-rose-600 hover:bg-rose-500 text-xs font-semibold py-1.5 px-3 rounded-lg transition-all whitespace-nowrap cursor-pointer shadow-md";
                roleBadge.innerText = "Admin Access";
                roleBadge.className = "bg-amber-500/20 text-[10px] text-amber-400 font-bold px-2 py-0.5 rounded border border-amber-500/30 whitespace-nowrap";
                adminUploadSection.classList.remove('hidden');
                setUploadType('movies');
                applyFilters();
            } else {
                document.getElementById('loginError').classList.remove('hidden');
            }
        });

        uploadForm.addEventListener('submit', (e) => {
            e.preventDefault();
            if (!isAdmin) return;

            const nameInput = document.getElementById('assetName');
            const fileInput = document.getElementById('assetFile');
            const file = fileInput.files[0];

            if (!file) return;

            submitBtn.innerText = "Uploading to Database Storage Layer...";
            submitBtn.disabled = true;

            const targetStore = currentUploadType;
            const newAsset = {
                id: Date.now(),
                name: nameInput.value.trim(),
                genre: assetGenre.value,
                likes: 0,
                fileBlob: file
            };

            const transaction = db.transaction([targetStore], "readwrite");
            const store = transaction.objectStore(targetStore);
            const addRequest = store.add(newAsset);

            addRequest.onsuccess = function() {
                if (targetStore === 'movies') videoLibrary.push(newAsset);
                else if (targetStore === 'apks') apkLibrary.push(newAsset);
                else if (targetStore === 'music') musicLibrary.push(newAsset);

                currentTab = targetStore;
                switchLibraryTab(currentTab);
                
                uploadForm.reset();
                setUploadType(targetStore);
                submitBtn.disabled = false;
            };

            transaction.onerror = function(event) {
                submitBtn.disabled = false;
                setUploadType(targetStore);
                console.error("Local writes bounced:", event.target.error);
                alert("Storage write failure: Verify local storage space limits have not been hit.");
            };
        });

        searchBar.addEventListener('input', applyFilters);
        genreFilter.addEventListener('change', applyFilters);

        function applyFilters() {
            const searchTerms = searchBar.value.toLowerCase();
            const selectedGenre = genreFilter.value;

            let activeDataset = [];
            if (currentTab === 'movies') activeDataset = videoLibrary;
            else if (currentTab === 'apks') activeDataset = apkLibrary;
            else if (currentTab === 'music') activeDataset = musicLibrary;

            const matches = activeDataset.filter(item => {
                const matchSearch = item.name.toLowerCase().includes(searchTerms);
                const matchGenre = (selectedGenre === 'all') || (item.genre === selectedGenre);
                return matchSearch && matchGenre;
            });

            renderGallery(matches);
        }

        function renderGallery(assets) {
            objectUrls.forEach(url => URL.revokeObjectURL(url));
            objectUrls = [];
            assetGrid.innerHTML = '';
            
            if (assets.length === 0) {
                noAssetsMessage.classList.remove('hidden');
                return;
            }
            noAssetsMessage.classList.add('hidden');

            assets.forEach(asset => {
                // FIXED PIPELINE: Fallback context check cleanly maps both old 'videoBlob' and new 'fileBlob' properties
                const activeBlob = asset.fileBlob || asset.videoBlob;
                if (!activeBlob) return; 

                const assetUrl = URL.createObjectURL(activeBlob);
                objectUrls.push(assetUrl);

                const card = document.createElement('div');
                card.className = "glass-card rounded-2xl overflow-hidden shadow-2xl flex flex-col justify-between transform hover:-translate-y-1 transition-all duration-300";
                
                const adminActionElement = isAdmin 
                    ? `<button onclick="deleteAsset(${asset.id}, '${currentTab}')" class="text-xs text-rose-400 hover:text-rose-300 font-bold border border-rose-500/30 bg-rose-500/10 px-2.5 py-1 rounded-md transition cursor-pointer">Delete</button>`
                    : ``;

                const uniqueLikeId = `${currentTab}_${asset.id}`;
                const hasLiked = likedItems.includes(uniqueLikeId);
                const likeBtnClass = hasLiked 
                    ? "flex items-center gap-1.5 text-xs text-pink-400 bg-pink-500/10 px-2.5 py-1.5 rounded-lg border border-pink-500/40 cursor-not-allowed"
                    : "flex items-center gap-1.5 text-xs text-slate-300 hover:text-pink-400 transition bg-slate-800 hover:bg-slate-700 px-2.5 py-1.5 rounded-lg border border-slate-700 cursor-pointer";

                let mediaPreviewTemplate = '';
                if (currentTab === 'movies') {
                    mediaPreviewTemplate = `
                        <div class="relative aspect-video bg-black">
                            <video src="${assetUrl}" controls class="w-full h-full object-contain"></video>
                        </div>`;
                } else if (currentTab === 'apks') {
                    mediaPreviewTemplate = `
                        <div class="aspect-video bg-gradient-to-br from-slate-900 to-indigo-950 flex flex-col items-center justify-center p-4 text-center">
                            <div class="text-4xl mb-2">🤖</div>
                            <span class="text-xs text-emerald-400 font-mono font-bold uppercase tracking-widest border border-emerald-500/20 bg-emerald-500/5 px-2 py-0.5 rounded">Android Package</span>
                        </div>`;
                } else if (currentTab === 'music') {
                    mediaPreviewTemplate = `
                        <div class="aspect-video bg-gradient-to-br from-slate-900 to-purple-950 flex flex-col justify-between p-4">
                            <div class="flex items-center gap-3">
                                <div class="text-3xl animate-pulse">🎵</div>
                                <div class="w-full"><div class="h-1 bg-purple-500/30 w-full rounded-full overflow-hidden"><div class="h-full bg-purple-400 w-1/3"></div></div></div>
                            </div>
                            <audio src="${assetUrl}" controls class="w-full native-audio-player opacity-90"></audio>
                        </div>`;
                }

                let actionControlsTemplate = '';
                if (currentTab === 'movies') {
                    actionControlsTemplate = `
                        <div class="flex items-center gap-2">
                            <select id="res-${asset.id}" class="bg-slate-800 text-xs text-slate-200 rounded-lg px-2 py-2 border border-slate-700 focus:outline-none w-full cursor-pointer">
                                <option value="360p">360p (SD)</option>
                                <option value="720p">720p (HD)</option>
                                <option value="1080p">1080p (FHD)</option>
                            </select>
                            <button onclick="downloadMovie(${asset.id})" class="bg-purple-600/20 text-purple-400 hover:bg-purple-600 hover:text-white border border-purple-500/30 text-xs font-bold px-3 py-2 rounded-lg transition whitespace-nowrap cursor-pointer">
                                ⬇️ Download
                            </button>
                        </div>`;
                } else {
                    actionControlsTemplate = `
                        <button onclick="downloadRawAsset(${asset.id}, '${currentTab}')" class="w-full bg-gradient-to-r from-purple-600 to-indigo-600 hover:from-purple-500 hover:to-indigo-500 text-white border border-purple-500/30 text-xs font-bold py-2 rounded-lg transition-all shadow-md cursor-pointer flex items-center justify-center gap-2">
                            ⬇️ Download ${currentTab === 'apks' ? 'Application APK' : 'Audio Track'}
                        </button>`;
                }

                card.innerHTML = `
                    <div class="relative">
                        ${mediaPreviewTemplate}
                        <span class="absolute top-2 left-2 bg-purple-900/90 text-[10px] uppercase font-bold tracking-wider px-2 py-0.5 rounded border border-purple-500/30 shadow-md">
                            ${asset.genre}
                        </span>
                    </div>
                    <div class="p-4 space-y-4 flex-1 flex flex-col justify-between">
                        <div>
                            <h3 class="font-bold text-slate-100 text-base truncate" title="${asset.name}">${asset.name}</h3>
                        </div>
                        
                        <div class="space-y-3 pt-3 border-t border-slate-700/50">
                            <div class="flex items-center justify-between gap-2">
                                <button onclick="likeAsset(${asset.id}, '${currentTab}')" ${hasLiked ? 'disabled' : ''} class="${likeBtnClass}">
                                    ❤️ <span class="font-bold">${asset.likes}</span> ${hasLiked ? 'Liked' : 'Likes'}
                                </button>
                                ${adminActionElement}
                            </div>
                            ${actionControlsTemplate}
                        </div>
                    </div>
                `;
                assetGrid.appendChild(card);
            });
        }

        window.likeAsset = function(id, tabType) {
            const uniqueLikeId = `${tabType}_${id}`;
            if (likedItems.includes(uniqueLikeId)) return;

            let targetLibrary = [];
            if (tabType === 'movies') targetLibrary = videoLibrary;
            else if (tabType === 'apks') targetLibrary = apkLibrary;
            else if (tabType === 'music') targetLibrary = musicLibrary;

            const index = targetLibrary.findIndex(item => item.id === id);
            if (index !== -1) {
                targetLibrary[index].likes += 1;
                
                likedItems.push(uniqueLikeId);
                localStorage.setItem('cinehub_liked_items', JSON.stringify(likedItems));
                
                const transaction = db.transaction([tabType], "readwrite");
                const store = transaction.objectStore(tabType);
                store.put(targetLibrary[index]);
                applyFilters();
            }
        };

        window.deleteAsset = function(id, tabType) {
            if (!isAdmin) return;
            const transaction = db.transaction([tabType], "readwrite");
            const store = transaction.objectStore(tabType);
            const deleteRequest = store.delete(id);

            deleteRequest.onsuccess = function() {
                if (tabType === 'movies') videoLibrary = videoLibrary.filter(m => m.id !== id);
                else if (tabType === 'apks') apkLibrary = apkLibrary.filter(a => a.id !== id);
                else if (tabType === 'music') musicLibrary = musicLibrary.filter(mu => mu.id !== id);
                
                const uniqueLikeId = `${tabType}_${id}`;
                likedItems = likedItems.filter(likedId => likedId !== uniqueLikeId);
                localStorage.setItem('cinehub_liked_items', JSON.stringify(likedItems));
                applyFilters();
            };
        };

        window.downloadMovie = function(id) {
            const movie = videoLibrary.find(m => m.id === id);
            if (!movie) return;

            const targetSelect = document.getElementById(`res-${id}`);
            const selectedResolution = targetSelect ? targetSelect.value : "720p";
            const activeBlob = movie.fileBlob || movie.videoBlob;

            const downloadUrl = URL.createObjectURL(activeBlob);
            const downloadAnchor = document.createElement('a');
            downloadAnchor.href = downloadUrl;
            downloadAnchor.download = `${movie.name.replace(/\s+/g, '_')}_[${selectedResolution}].mp4`;
            document.body.appendChild(downloadAnchor);
            downloadAnchor.click();
            document.body.removeChild(downloadAnchor);
            setTimeout(() => URL.revokeObjectURL(downloadUrl), 100);
        };

        window.downloadRawAsset = function(id, tabType) {
            let asset = null;
            let extension = "";
            if (tabType === 'apks') {
                asset = apkLibrary.find(a => a.id === id);
                extension = ".apk";
            } else if (tabType === 'music') {
                asset = musicLibrary.find(m => m.id === id);
                extension = ".mp3";
            }

            if (!asset) return;
            const activeBlob = asset.fileBlob || asset.videoBlob;

            const downloadUrl = URL.createObjectURL(activeBlob);
            const downloadAnchor = document.createElement('a');
            downloadAnchor.href = downloadUrl;
            downloadAnchor.download = `${asset.name.replace(/\s+/g, '_')}${extension}`;
            document.body.appendChild(downloadAnchor);
            downloadAnchor.click();
            document.body.removeChild(downloadAnchor);
            setTimeout(() => URL.revokeObjectURL(downloadUrl), 100);
        };
    </script>
</body>
</html>
