<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MovieSlots🎬- Premium Media Library</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        @keyframes rgbGradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .animated-rgb-bg {
            background: linear-gradient(-45deg, #0f172a, #1e1b4b, #2e1065, #3b0764, #0f172a);
            background-size: 400% 400%;
            animation: rgbGradient 15s ease infinite;
        }
        .glass-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
    </style>
</head>
<body class="animated-rgb-bg text-gray-100 min-h-screen font-sans antialiased">

    <!-- Top Navbar Bar -->
    <header class="bg-slate-900/80 backdrop-blur-md border-b border-slate-700/50 sticky top-0 z-50 p-4 shadow-2xl">
        <div class="max-w-7xl mx-auto flex flex-col lg:flex-row items-center justify-between gap-6">
            <div class="flex flex-col md:flex-row items-center gap-6 w-full lg:w-auto flex-1">
                <h1 class="text-3xl font-black text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 via-purple-400 to-pink-400 tracking-wider whitespace-nowrap drop-shadow-sm">🎬 CineHub</h1>
                
                <!-- Guest View Filters -->
                <div id="guestControls" class="flex flex-col sm:flex-row items-center gap-4 w-full">
                    <input type="text" id="searchBar" placeholder="Search assets..." class="w-full md:max-w-md bg-slate-800/90 text-white placeholder-slate-400 rounded-xl px-5 py-3 text-base focus:outline-none focus:ring-2 focus:ring-purple-500 border border-slate-600/60 shadow-inner">
                    <select id="genreFilter" class="w-full sm:w-56 bg-slate-800/90 text-white rounded-xl px-4 py-3 text-base focus:outline-none focus:ring-2 focus:ring-purple-500 border border-slate-600/60 cursor-pointer shadow-inner">
                        <option value="all">All Genres / Tags</option>
                        <option value="Action">Action</option>
                        <option value="Drama">Drama</option>
                        <option value="Comedy">Comedy</option>
                        <option value="Tools">Tools</option>
                        <option value="Games">Games</option>
                        <option value="Music Track">Music Track</option>
                    </select>
                </div>
            </div>
            
            <!-- Tab & Access Switchers -->
            <div class="flex items-center gap-4">
                <div class="flex gap-2 p-1 bg-slate-950/60 border border-slate-700/50 rounded-xl">
                    <button id="tab-movies" onclick="switchLibraryTab('movies')" class="px-4 py-2 rounded-lg text-sm font-bold bg-purple-600 text-white shadow transition-all cursor-pointer">Movies</button>
                    <button id="tab-apks" onclick="switchLibraryTab('apks')" class="px-4 py-2 rounded-lg text-sm font-bold text-slate-400 hover:text-white transition-all cursor-pointer">APKs</button>
                    <button id="tab-music" onclick="switchLibraryTab('music')" class="px-4 py-2 rounded-lg text-sm font-bold text-slate-400 hover:text-white transition-all cursor-pointer">Music</button>
                </div>
                <button id="adminAuthBtn" onclick="toggleAdminView()" class="bg-slate-800 hover:bg-slate-700 text-slate-300 font-bold px-4 py-2 text-sm rounded-xl border border-slate-600/50 transition-all cursor-pointer">Panel Mode</button>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto p-4 md:p-8 space-y-8">
        
        <!-- ADMIN PANEL SECTION (Hidden by default) -->
        <section id="adminPanel" class="hidden glass-card rounded-2xl p-6 border border-purple-500/30 space-y-6">
            <div class="flex justify-between items-center border-b border-slate-700 pb-4">
                <h2 class="text-2xl font-black text-purple-400 tracking-wide">⚙️ Admin Control Panel</h2>
                <button onclick="logoutAdmin()" class="bg-red-600/20 hover:bg-red-600 text-red-400 hover:text-white text-xs font-bold px-3 py-1.5 rounded-lg transition-all cursor-pointer">Exit Session</button>
            </div>
            
            <!-- Asset Upload / Form Matrix -->
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4 items-end bg-slate-950/40 p-4 rounded-xl border border-slate-800 shadow-inner">
                <div>
                    <label class="block text-xs font-bold text-slate-400 mb-1 uppercase tracking-wider">Asset Title</label>
                    <input type="text" id="newTitle" placeholder="e.g. Inception" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2.5 text-sm text-white focus:outline-none focus:border-purple-500">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-400 mb-1 uppercase tracking-wider">Google Drive File ID</label>
                    <input type="text" id="newDriveId" placeholder="1Zpk7kFnxQ9IU..." class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2.5 text-sm text-white focus:outline-none focus:border-purple-500">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-400 mb-1 uppercase tracking-wider">Genre Classification</label>
                    <select id="newGenre" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2.5 text-sm text-white focus:outline-none focus:border-purple-500 cursor-pointer">
                        <option value="Action">Action</option>
                        <option value="Drama">Drama</option>
                        <option value="Comedy">Comedy</option>
                        <option value="Tools">Tools</option>
                        <option value="Games">Games</option>
                        <option value="Music Track">Music Track</option>
                    </select>
                </div>
                <button onclick="addNewAsset()" class="w-full bg-gradient-to-r from-purple-600 to-indigo-600 hover:from-purple-500 hover:to-indigo-500 text-white font-bold py-2.5 rounded-lg text-sm shadow transition-all cursor-pointer">➕ Register Asset</button>
            </div>
        </section>

        <!-- DYNAMIC GUEST STOREFRONT DISPLAY -->
        <section id="guestGallery">
            <div id="assetGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
            <div id="noAssetsMessage" class="hidden text-center text-slate-500 py-20">
                <p class="text-xl font-medium">No files registered or found matching current criteria.</p>
            </div>
        </section>
    </main>

    <script>
        // System Access Matrix Keys
        const ADMIN_USER = "admin";
        const ADMIN_PASS = "admin"; 
        let isAdminLoggedIn = false;

        let currentTab = 'movies';
        
        // Dynamic Local Storage Data Cache Loop (Allows client persistence without backend failures)
        let allAssets = JSON.parse(localStorage.getItem('cinehub_storage')) || {
            movies: [
                { id: "1Zpk7kFnxQ9IUxzEQ46uQpJOzvINid5vo", name: "Sample Premium Movie Title", genre: "Action" }
            ],
            apks: [
                { id: "1Zpk7kFnxQ9IUxzEQ46uQpJOzvINid5vo", name: "Sample Premium App Tool", genre: "Tools" }
            ],
            music: [
                { id: "1Zpk7kFnxQ9IUxzEQ46uQpJOzvINid5vo", name: "Sample High Quality Audio Track", genre: "Music Track" }
            ]
        };

        const searchBar = document.getElementById('searchBar');
        const genreFilter = document.getElementById('genreFilter');
        const assetGrid = document.getElementById('assetGrid');
        const noAssetsMessage = document.getElementById('noAssetsMessage');
        const adminPanel = document.getElementById('adminPanel');
        const adminAuthBtn = document.getElementById('adminAuthBtn');

        searchBar.addEventListener('input', renderAssets);
        genreFilter.addEventListener('change', renderAssets);

        // Core UI Engine Renderer
        function renderAssets() {
            assetGrid.innerHTML = '';
            const query = searchBar.value.toLowerCase().trim();
            const filterGenre = genreFilter.value;
            const currentData = allAssets[currentTab] || [];

            const filtered = currentData.filter(item => {
                const matchesSearch = item.name.toLowerCase().includes(query);
                const matchesGenre = (filterGenre === 'all' || item.genre === filterGenre);
                return matchesSearch && matchesGenre;
            });

            if (filtered.length === 0) {
                noAssetsMessage.classList.remove('hidden');
                return;
            }
            noAssetsMessage.classList.add('hidden');

            filtered.forEach((item, index) => {
                const card = document.createElement('div');
                card.className = "glass-card rounded-2xl overflow-hidden shadow-xl flex flex-col border border-slate-700/40 relative";
                
                let previewFrame = '';
                if (currentTab === 'movies') {
                    previewFrame = `
                        <div class="relative w-full aspect-video bg-black">
                            <iframe src="https://drive.google.com/file/d/${item.id}/preview" class="w-full h-full border-0" allow="autoplay" allowfullscreen></iframe>
                        </div>`;
                } else if (currentTab === 'music') {
                    previewFrame = `
                        <div class="p-4 bg-slate-950/40 border-b border-slate-800">
                            <iframe src="https://drive.google.com/file/d/${item.id}/preview" class="w-full h-20 border-0 rounded-lg"></iframe>
                        </div>`;
                } else {
                    previewFrame = `
                        <div class="h-36 bg-gradient-to-br from-slate-800 to-slate-950 flex flex-col items-center justify-center border-b border-slate-800 text-slate-500">
                            <span class="text-4xl mb-1">🤖</span>
                            <span class="text-xs uppercase tracking-wider font-bold text-slate-400">Android Package</span>
                        </div>`;
                }

                // Delete Button Layer inside Admin Module Interface
                let adminDeleteBtn = '';
                if (isAdminLoggedIn) {
                    adminDeleteBtn = `
                        <button onclick="deleteAsset('${index}')" class="absolute top-2 right-2 bg-red-600 hover:bg-red-500 text-white font-bold p-2 text-xs rounded-lg shadow-md z-40 transition-all cursor-pointer">
                            🗑️ Delete
                        </button>
                    `;
                }

                card.innerHTML = `
                    ${adminDeleteBtn}
                    ${previewFrame}
                    <div class="p-5 flex-1 flex flex-col justify-between space-y-4">
                        <div>
                            <span class="inline-block bg-purple-500/10 text-purple-400 text-xs font-bold px-2.5 py-1 rounded-md mb-2 border border-purple-500/20">${item.genre}</span>
                            <h4 class="text-lg font-bold text-white tracking-wide">${item.name}</h4>
                        </div>
                        <div class="flex items-center gap-2 pt-2">
                            <a href="https://drive.google.com/uc?export=download&id=${item.id}" target="_blank" class="flex-1 bg-gradient-to-r from-purple-600 to-indigo-600 hover:from-purple-500 hover:to-indigo-500 text-white text-center text-sm font-bold py-2.5 px-4 rounded-xl shadow transition-all cursor-pointer">
                                📥 Download File
                            </a>
                        </div>
                    </div>`;
                assetGrid.appendChild(card);
            });
        }

        // Authentication Controller Core
        window.toggleAdminView = function() {
            if (!isAdminLoggedIn) {
                const usernameInput = prompt("Enter Admin ID Account Name:");
                const passwordInput = prompt("Enter Administration Matrix Password:");
                
                if (usernameInput === ADMIN_USER && passwordInput === ADMIN_PASS) {
                    isAdminLoggedIn = true;
                    adminPanel.classList.remove('hidden');
                    adminAuthBtn.innerText = "Guest Mode View";
                    adminAuthBtn.className = "bg-purple-600 hover:bg-purple-500 text-white font-bold px-4 py-2 text-sm rounded-xl border border-purple-400/50 transition-all cursor-pointer";
                    renderAssets();
                } else {
                    alert("Authentication Error: Invalid login credentials matching database registry key.");
                }
            } else {
                logoutAdmin();
            }
        };

        window.logoutAdmin = function() {
            isAdminLoggedIn = false;
            adminPanel.classList.add('hidden');
            adminAuthBtn.innerText = "Panel Mode";
            adminAuthBtn.className = "bg-slate-800 hover:bg-slate-700 text-slate-300 font-bold px-4 py-2 text-sm rounded-xl border border-slate-600/50 transition-all cursor-pointer";
            renderAssets();
        };

        // Admin Management Processing Methods
        window.addNewAsset = function() {
            const title = document.getElementById('newTitle').value.trim();
            const driveId = document.getElementById('newDriveId').value.trim();
            const genre = document.getElementById('newGenre').value;

            if (!title || !driveId) {
                alert("Please fully register both Title structure and Drive identifier parameter values.");
                return;
            }

            // Map data classification structure
            let targetCategory = 'movies';
            if (genre === 'Tools' || genre === 'Games') targetCategory = 'apks';
            if (genre === 'Music Track') targetCategory = 'music';

            allAssets[targetCategory].push({ id: driveId, name: title, genre: genre });
            saveAndRefresh();

            // Reset inputs fields
            document.getElementById('newTitle').value = '';
            document.getElementById('newDriveId').value = '';
        };

        window.deleteAsset = function(index) {
            if (confirm("Execute process command loop to delete item matrix from system storage data structures?")) {
                allAssets[currentTab].splice(index, 1);
                saveAndRefresh();
            }
        };

        function saveAndRefresh() {
            localStorage.setItem('cinehub_storage', JSON.stringify(allAssets));
            renderAssets();
        }

        window.switchLibraryTab = function(tabName) {
            currentTab = tabName;
            ['movies', 'apks', 'music'].forEach(t => {
                const btn = document.getElementById(`tab-${t}`);
                btn.className = (t === tabName) 
                    ? "px-4 py-2 rounded-lg text-sm font-bold bg-purple-600 text-white shadow transition-all cursor-pointer"
                    : "px-4 py-2 rounded-lg text-sm font-bold text-slate-400 hover:text-white transition-all cursor-pointer";
            });
            renderAssets();
        };

        // Boot Up Engine Immediately
        renderAssets();
    </script>
</body>
</html>
