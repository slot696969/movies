<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Compressor by MovieSlot</title>
    <!-- Tailwind CSS for modern styling -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        /* Smooth High-End RGB Neon Background Animation */
        @keyframes rgbGradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .animated-rgb-bg {
            background: linear-gradient(-45deg, #0f172a, #1e1b4b, #2e1065, #3b0764, #0f172a);
            background-size: 400% 400%;
            animation: rgbGradient 15s ease infinite;
        }
        .glass-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
    </style>
</head>
<body class="animated-rgb-bg text-gray-100 min-h-screen font-sans antialiased">

    <!-- Header & Navigation -->
    <header class="bg-slate-900/80 backdrop-blur-md border-b border-slate-700/50 sticky top-0 z-50 p-4 shadow-2xl">
        <div class="max-w-7xl mx-auto flex flex-col lg:flex-row items-center justify-between gap-6">
            
            <!-- Left Side: App Logo & Controls -->
            <div class="flex flex-col md:flex-row items-center gap-6 w-full lg:w-auto flex-1">
                <h1 class="text-2xl font-black text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 via-purple-400 to-pink-400 tracking-wider whitespace-nowrap drop-shadow-sm">🎬 Movie Compressor by MovieSlot</h1>
                
                <div class="flex flex-col sm:flex-row items-center gap-4 w-full">
                    <input 
                        type="text" 
                        id="searchBar" 
                        placeholder="Search assets..." 
                        class="w-full md:max-w-md bg-slate-800/90 text-white placeholder-slate-400 rounded-xl px-5 py-3 text-base focus:outline-none focus:ring-2 focus:ring-purple-500 border border-slate-600/60 shadow-inner"
                    >
                    <select 
                        id="genreFilter" 
                        class="w-full sm:w-56 bg-slate-800/90 text-white rounded-xl px-4 py-3 text-base focus:outline-none focus:ring-2 focus:ring-purple-500 border border-slate-600/60 cursor-pointer shadow-inner"
                    >
                        <option value="all">All Genres / Types</option>
                        <option value="Romantic">Romantic</option>
                        <option value="Psycho">Psycho</option>
                        <option value="Comedy">Comedy</option>
                        <option value="Action">Action</option>
                        <option value="Drama">Drama</option>
                        <option value="Tools">Tools (APK)</option>
                        <option value="Games">Games (APK)</option>
                        <option value="Pop">Pop (Music)</option>
                        <option value="Rock">Rock (Music)</option>
                        <option value="Lo-Fi">Lo-Fi (Music)</option>
                    </select>
                </div>
            </div>
            
            <!-- Library Module Switcher -->
            <div class="flex gap-2 p-1 bg-slate-950/60 border border-slate-700/50 rounded-xl">
                <button id="tab-movies" onclick="switchLibraryTab('movies')" class="px-4 py-2 rounded-lg text-sm font-bold bg-purple-600 text-white shadow transition-all cursor-pointer">Movies</button>
                <button id="tab-apks" onclick="switchLibraryTab('apks')" class="px-4 py-2 rounded-lg text-sm font-bold text-slate-400 hover:text-white transition-all cursor-pointer">APKs</button>
                <button id="tab-music" onclick="switchLibraryTab('music')" class="px-4 py-2 rounded-lg text-sm font-bold text-slate-400 hover:text-white transition-all cursor-pointer">Music</button>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto p-4 md:p-8 space-y-8">
        
        <!-- Public Shared Upload Section -->
        <section id="uploadSection" class="glass-card p-6 rounded-2xl border border-purple-500/30 shadow-2xl">
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 gap-4">
                <h2 class="text-xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-amber-400 to-purple-400 flex items-center gap-2">
                    <span>⚡ Upload & Share Hub</span>
                </h2>
                <!-- Upload Sub-tabs Switcher -->
                <div class="flex bg-slate-950/40 p-1 border border-slate-700/60 rounded-xl">
                    <button type="button" onclick="setUploadType('movies')" id="upload-tab-movies" class="px-3 py-1.5 rounded-lg text-xs font-bold bg-purple-600 text-white transition-all cursor-pointer">Upload Movie</button>
                    <button type="button" onclick="setUploadType('apks')" id="upload-tab-apks" class="px-3 py-1.5 rounded-lg text-xs font-bold text-slate-400 hover:text-white transition-all cursor-pointer">Upload APK</button>
                    <button type="button" onclick="setUploadType('music')" id="upload-tab-music" class="px-3 py-1.5 rounded-lg text-xs font-bold text-slate-400 hover:text-white transition-all cursor-pointer">Upload Music</button>
                </div>
            </div>

            <form id="uploadForm" class="grid grid-cols-1 md:grid-cols-4 gap-4 items-end">
                <div class="md:col-span-1">
                    <label id="nameLabel" class="block text-sm font-semibold text-slate-300 mb-1">Movie Name</label>
                    <input type="text" id="assetName" required placeholder="Title" class="w-full bg-slate-800/90 text-white rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-purple-500 border border-slate-700">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-300 mb-1">Genre / Tag</label>
                    <select id="assetGenre" required class="w-full bg-slate-800/90 text-white rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-purple-500 border border-slate-700">
                        <option value="Romantic">Romantic</option>
                        <option value="Psycho">Psycho</option>
                        <option value="Comedy">Comedy</option>
                        <option value="Action">Action</option>
                        <option value="Drama">Drama</option>
                    </select>
                </div>
                <div>
                    <label id="fileLabel" class="block text-sm font-semibold text-slate-300 mb-1">Video File</label>
                    <input type="file" id="assetFile" accept="video/*" required class="w-full text-xs text-slate-400 file:mr-3 file:py-2 file:px-3 file:rounded-lg file:border-0 file:text-xs file:font-bold file:bg-purple-600 file:text-white hover:file:bg-purple-500 file:transition-all cursor-pointer">
                </div>
                <button type="submit" id="submitBtn" class="bg-gradient-to-r from-emerald-600 to-teal-600 hover:from-emerald-500 hover:to-teal-500 text-white font-bold py-2 px-6 rounded-lg transition-all shadow-lg w-full disabled:from-slate-700 disabled:to-slate-700 disabled:cursor-not-allowed cursor-pointer">
                    Publish Movie
                </button>
            </form>
        </section>

        <!-- Dynamic Content Display Dashboard -->
        <section>
            <div id="assetGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <!-- Dynamic component cards populated asynchronously by JavaScript -->
            </div>
            <div id="noAssetsMessage" class="hidden text-center text-slate-500 py-20">
                <p class="text-xl font-medium">No files found fitting those parameters.</p>
            </div>
        </section>
    </main>

    <script>
        // DOM bindings
        const uploadForm = document.getElementById('uploadForm');
        const submitBtn = document.getElementById('submitBtn');
        const assetGrid = document.getElementById('assetGrid');
        const searchBar = document.getElementById('searchBar');
        const genreFilter = document.getElementById('genreFilter');
        const noAssetsMessage = document.getElementById('noAssetsMessage');

        // Form Label Context Variables
        const nameLabel = document.getElementById('nameLabel');
        const fileLabel = document.getElementById('fileLabel');
        const assetFile = document.getElementById('assetFile');
        const assetGenre = document.getElementById('assetGenre');

        // State Machine Storage
        let currentTab = 'movies'; 
        let currentUploadType = 'movies'; 
        
        // Data Store Buffers
        let videoLibrary = [];
        let apkLibrary = [];
        let musicLibrary = [];
        
        let db = null;
        let likedItems = JSON.parse(localStorage.getItem('movieslots_liked')) || [];

        // Dynamic Genre Engine configurations mapping
        const genreMap = {
            movies: ['Romantic', 'Psycho', 'Comedy', 'Action', 'Drama'],
            apks: ['Tools', 'Games'],
            music: ['Pop', 'Rock', 'Lo-Fi']
        };

        // Initialize Scaled Database Architecture
        const dbName = "CineHubDatabase";
        const request = indexedDB.open(dbName, 2);

        request.onupgradeneeded = function(e) {
            db = e.target.result;
            ['movies', 'apks', 'music'].forEach(store => {
                if (!db.objectStoreNames.contains(store)) {
                    db.createObjectStore(store, { keyPath: "id" });
                }
            });
        };

        request.onsuccess = function(e) {
            db = e.target.result;
            loadAllLibraries();
        };

        request.onerror = function() {
            console.error("Database interface down.");
        };

        function loadAllLibraries() {
            if (!db) return;
            let counter = 0;
            const checkAndRender = () => {
                counter++;
                if (counter === 3) applyFilters();
            };

            db.transaction(["movies"], "readonly").objectStore("movies").getAll().onsuccess = function(e) {
                videoLibrary = e.target.result || [];
                checkAndRender();
            };
            db.transaction(["apks"], "readonly").objectStore("apks").getAll().onsuccess = function(e) {
                apkLibrary = e.target.result || [];
                checkAndRender();
            };
            db.transaction(["music"], "readonly").objectStore("music").getAll().onsuccess = function(e) {
                musicLibrary = e.target.result || [];
                checkAndRender();
            };
        }

        window.switchLibraryTab = function(tabName) {
            currentTab = tabName;
            ['movies', 'apks', 'music'].forEach(t => {
                const btn = document.getElementById(`tab-${t}`);
                btn.className = t === tabName 
                    ? "px-4 py-2 rounded-lg text-sm font-bold bg-purple-600 text-white shadow transition-all cursor-pointer"
                    : "px-4 py-2 rounded-lg text-sm font-bold text-slate-400 hover:text-white transition-all cursor-pointer";
            });
            applyFilters();
        };

        window.setUploadType = function(type) {
            currentUploadType = type;
            ['movies', 'apks', 'music'].forEach(t => {
                const btn = document.getElementById(`upload-tab-${t}`);
                btn.className = t === type 
                    ? "px-3 py-1.5 rounded-lg text-xs font-bold bg-purple-600 text-white transition-all cursor-pointer"
                    : "px-3 py-1.5 rounded-lg text-xs font-bold text-slate-400 hover:text-white transition-all cursor-pointer";
            });

            if (type === 'movies') {
                nameLabel.innerText = "Movie Name"; fileLabel.innerText = "Video File";
                assetFile.accept = "video/*"; submitBtn.innerText = "Publish Movie";
            } else if (type === 'apks') {
                nameLabel.innerText = "Application Name"; fileLabel.innerText = "Android Binary (APK)";
                assetFile.accept = ".apk"; submitBtn.innerText = "Publish App Package";
            } else if (type === 'music') {
                nameLabel.innerText = "Track Name / Title"; fileLabel.innerText = "Audio File";
                assetFile.accept = "audio/*"; submitBtn.innerText = "Publish Track";
            }

            assetGenre.innerHTML = '';
            genreMap[type].forEach(g => {
                const opt = document.createElement('option');
                opt.value = g; opt.innerText = g;
                assetGenre.appendChild(opt);
            });
        };

        // Handle Asset Uploads
        uploadForm.addEventListener('submit', (e) => {
            e.preventDefault();

            const nameInput = document.getElementById('assetName');
            const fileInput = document.getElementById('assetFile');
            const file = fileInput.files[0];
            if (!file) return;

            submitBtn.innerText = "Uploading to DB...";
            submitBtn.disabled = true;

            const targetStore = currentUploadType;
            const newAsset = {
                id: Date.now(),
                name: nameInput.value.trim(),
                genre: assetGenre.value,
                likes: 0,
                fileBlob: file
            };

            const transaction = db.transaction([targetStore], "readwrite");
            transaction.objectStore(targetStore).add(newAsset).onsuccess = function() {
                if (targetStore === 'movies') videoLibrary.push(newAsset);
                else if (targetStore === 'apks') apkLibrary.push(newAsset);
                else if (targetStore === 'music') musicLibrary.push(newAsset);

                uploadForm.reset();
                submitBtn.disabled = false;
                setUploadType(targetStore);
                applyFilters();
            };
        });

        // Trigger dynamic asset download processing
        window.downloadAsset = function(id, storeName) {
            let list = [];
            if (storeName === 'movies') list = videoLibrary;
            else if (storeName === 'apks') list = apkLibrary;
            else if (storeName === 'music') list = musicLibrary;

            const targetItem = list.find(item => item.id === id);
            if (!targetItem || !targetItem.fileBlob) {
                alert("File mapping error or corrupted resource storage container data.");
                return;
            }

            const downloadUrl = URL.createObjectURL(targetItem.fileBlob);
            const downloadAnchor = document.createElement('a');
            downloadAnchor.href = downloadUrl;
            downloadAnchor.download = targetItem.fileBlob.name || `${targetItem.name}_file`;
            document.body.appendChild(downloadAnchor);
            downloadAnchor.click();
            document.body.removeChild(downloadAnchor);
            URL.revokeObjectURL(downloadUrl);
        };

        // Interactive Liking Mechanics Engine
        window.likeAsset = function(id, storeName) {
            let list = [];
            if (storeName === 'movies') list = videoLibrary;
            else if (storeName === 'apks') list = apkLibrary;
            else if (storeName === 'music') list = musicLibrary;

            const targetItem = list.find(item => item.id === id);
            if (!targetItem) return;

            const identifier = `${storeName}_${id}`;
            if (likedItems.includes(identifier)) {
                targetItem.likes = Math.max(0, targetItem.likes - 1);
                likedItems = likedItems.filter(x => x !== identifier);
            } else {
                targetItem.likes += 1;
                likedItems.push(identifier);
            }

            localStorage.setItem('movieslots_liked', JSON.stringify(likedItems));

            const transaction = db.transaction([storeName], "readwrite");
            transaction.objectStore(storeName).put(targetItem).onsuccess = function() {
                applyFilters();
            };
        };

        // Filter and Render UI Cards
        window.applyFilters = function() {
            assetGrid.innerHTML = '';
            const query = searchBar.value.toLowerCase();
            const selectedGenre = genreFilter.value;

            let activeList = [];
            if (currentTab === 'movies') activeList = videoLibrary;
            else if (currentTab === 'apks') activeList = apkLibrary;
            else if (currentTab === 'music') activeList = musicLibrary;

            const filtered = activeList.filter(item => {
                const matchesSearch = item.name.toLowerCase().includes(query);
                const matchesGenre = selectedGenre === 'all' || item.genre === selectedGenre;
                return matchesSearch && matchesGenre;
            });

            if (filtered.length === 0) {
                noAssetsMessage.classList.remove('hidden');
                return;
            }
            noAssetsMessage.classList.add('hidden');

            filtered.forEach(item => {
                const identifier = `${currentTab}_${item.id}`;
                const hasLiked = likedItems.includes(identifier);
                
                let mediaPlaybackNode = '';
                if (currentTab === 'movies' && item.fileBlob) {
                    const videoSrc = URL.createObjectURL(item.fileBlob);
                    mediaPlaybackNode = `<video src="${videoSrc}" controls class="w-full h-44 object-cover rounded-lg bg-slate-950 mb-3"></video>`;
                } else if (currentTab === 'music' && item.fileBlob) {
                    const audioSrc = URL.createObjectURL(item.fileBlob);
                    mediaPlaybackNode = `<audio src="${audioSrc}" controls class="w-full mb-3 class-audio bg-slate-800 rounded-lg p-1"></audio>`;
                } else {
                    mediaPlaybackNode = `
                        <div class="h-44 bg-slate-950/40 border border-slate-800 rounded-lg flex flex-col items-center justify-center text-slate-500 mb-3 gap-2">
                            <span class="text-4xl">🤖</span>
                            <span class="text-xs font-mono text-slate-400">${item.fileBlob ? (item.fileBlob.size / (1024*1024)).toFixed(2) + ' MB' : 'Package Setup Available'}</span>
                        </div>
                    `;
                }

                const card = document.createElement('div');
                card.className = "glass-card p-4 rounded-2xl flex flex-col justify-between border border-slate-700/40 shadow-lg relative group overflow-hidden hover:border-purple-500/40 transition-all";
                card.innerHTML = `
                    <div>
                        ${mediaPlaybackNode}
                        <div class="flex items-start justify-between gap-2 mt-1">
                            <h3 class="font-bold text-base text-white tracking-wide truncate max-w-[70%]">${item.name}</h3>
                            <span class="text-[10px] font-bold tracking-wider px-2 py-0.5 bg-purple-900/40 text-purple-300 border border-purple-700/40 rounded-full">${item.genre}</span>
                        </div>
                    </div>
                    
                    <div class="flex items-center justify-between mt-4 pt-3 border-t border-slate-800/80 gap-2">
                        <button onclick="likeAsset(${item.id}, '${currentTab}')" class="flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-xs font-bold transition-all cursor-pointer ${hasLiked ? 'bg-pink-600 text-white' : 'bg-slate-800/80 text-slate-400 hover:text-slate-200'}">
                            <span>❤️</span> <span>${item.likes}</span>
                        </button>
                        
                        <button onclick="downloadAsset(${item.id}, '${currentTab}')" class="flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-xs font-bold bg-indigo-600 hover:bg-indigo-500 text-white shadow-md transition-all cursor-pointer ml-auto">
                            <span>📥</span> <span>Download</span>
                        </button>
                    </div>
                `;
                assetGrid.appendChild(card);
            });
        };

        // Attach filter listeners
        searchBar.addEventListener('input', applyFilters);
        genreFilter.addEventListener('change', applyFilters);

        // Preload default state
        setUploadType('movies');
    </script>
</body>
</html>
