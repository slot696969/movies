<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineHub - Video Library</title>
    <!-- Tailwind CSS for modern styling -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen font-sans">

    <!-- Header & Navigation -->
    <header class="bg-gray-800 border-b border-gray-700 sticky top-0 z-50 p-4 shadow-lg">
        <div class="max-w-7xl mx-auto flex flex-col lg:flex-row items-center justify-between gap-6">
            
            <!-- Left Side: App Logo & LARGER Guest Mode Options (Search & Sorting) -->
            <div class="flex flex-col md:flex-row items-center gap-6 w-full lg:w-auto flex-1">
                <h1 class="text-3xl font-extrabold text-indigo-400 tracking-wide whitespace-nowrap">🎬 CineHub</h1>
                
                <div class="flex flex-col sm:flex-row items-center gap-4 w-full">
                    <input 
                        type="text" 
                        id="searchBar" 
                        placeholder="Search movies..." 
                        class="w-full md:max-w-md bg-gray-700 text-white placeholder-gray-400 rounded-xl px-5 py-3 text-base focus:outline-none focus:ring-2 focus:ring-indigo-500 border border-gray-600 shadow-inner"
                    >
                    <select 
                        id="genreFilter" 
                        class="w-full sm:w-56 bg-gray-700 text-white rounded-xl px-4 py-3 text-base focus:outline-none focus:ring-2 focus:ring-indigo-500 border border-gray-600 cursor-pointer shadow-inner"
                    >
                        <option value="all">All Genres</option>
                        <option value="Romantic">Romantic</option>
                        <option value="Psycho">Psycho</option>
                        <option value="Comedy">Comedy</option>
                        <option value="Action">Action</option>
                        <option value="Drama">Drama</option>
                    </select>
                </div>
            </div>
            
            <!-- Right Side: COMPACT Admin Controls Area -->
            <div class="flex items-center gap-2 justify-end w-full lg:w-auto border-t lg:border-t-0 border-gray-700 pt-4 lg:pt-0">
                <span id="roleBadge" class="bg-gray-700 text-[10px] text-gray-400 font-medium px-2 py-0.5 rounded border border-gray-600 whitespace-nowrap">Guest</span>
                <button 
                    id="authBtn" 
                    class="bg-indigo-600 hover:bg-indigo-500 text-xs font-medium py-1 px-2.5 rounded transition whitespace-nowrap cursor-pointer shadow-sm"
                >
                    Admin Login
                </button>
            </div>
        </div>
    </header>

    <!-- Admin Login Modal -->
    <div id="loginModal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50 p-4 backdrop-blur-sm">
        <div class="bg-gray-800 border border-gray-700 p-6 rounded-xl shadow-2xl w-full max-w-sm">
            <h3 class="text-lg font-semibold text-indigo-400 mb-4">Admin Authentication</h3>
            <div class="space-y-3">
                <div>
                    <label class="block text-xs font-medium text-gray-400 mb-1">Admin ID</label>
                    <input type="text" id="adminId" class="w-full bg-gray-700 rounded-lg px-3 py-2 text-white border border-gray-600 focus:outline-none focus:ring-2 focus:ring-indigo-500">
                </div>
                <div>
                    <label class="block text-xs font-medium text-gray-400 mb-1">Password</label>
                    <input type="password" id="adminPassword" class="w-full bg-gray-700 rounded-lg px-3 py-2 text-white border border-gray-600 focus:outline-none focus:ring-2 focus:ring-indigo-500">
                </div>
                <p id="loginError" class="text-xs text-rose-400 hidden">Invalid ID or Password!</p>
                <div class="flex justify-end gap-2 pt-2">
                    <button id="closeModalBtn" class="bg-gray-700 hover:bg-gray-600 text-sm px-4 py-2 rounded-lg">Cancel</button>
                    <button id="submitLoginBtn" class="bg-indigo-600 hover:bg-indigo-500 text-sm px-4 py-2 rounded-lg font-medium">Login</button>
                </div>
            </div>
        </div>
    </div>

    <main class="max-w-7xl mx-auto p-4 md:p-8 space-y-8">
        
        <!-- Upload Section (Visible to Admin Only) -->
        <section id="adminUploadSection" class="hidden bg-gray-800 p-6 rounded-xl border border-indigo-900/50 shadow-md">
            <h2 class="text-xl font-semibold mb-4 text-indigo-300 flex items-center gap-2">
                <span>⚡ Admin Control Panel: Upload Video</span>
            </h2>
            <form id="uploadForm" class="grid grid-cols-1 md:grid-cols-4 gap-4 items-end">
                <div class="md:col-span-1">
                    <label class="block text-sm font-medium text-gray-400 mb-1">Movie Name</label>
                    <input type="text" id="videoName" required placeholder="Title" class="w-full bg-gray-700 text-white rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-500 border border-gray-600">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-1">Genre (Sort By)</label>
                    <select id="videoGenre" required class="w-full bg-gray-700 text-white rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-500 border border-gray-600">
                        <option value="Romantic">Romantic</option>
                        <option value="Psycho">Psycho</option>
                        <option value="Comedy">Comedy</option>
                        <option value="Action">Action</option>
                        <option value="Drama">Drama</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-1">Video File</label>
                    <input type="file" id="videoFile" accept="video/*" required class="w-full text-xs text-gray-400 file:mr-3 file:py-2 file:px-3 file:rounded-lg file:border-0 file:text-xs file:font-semibold file:bg-indigo-600 file:text-white hover:file:bg-indigo-500 cursor-pointer">
                </div>
                <button type="submit" class="bg-emerald-600 hover:bg-emerald-500 text-white font-medium py-2 px-6 rounded-lg transition shadow-md w-full">
                    Publish Movie
                </button>
            </form>
        </section>

        <!-- Video Gallery Display -->
        <section>
            <div id="videoGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <!-- Dynamic cards generated via JS -->
            </div>
            <div id="noVideosMessage" class="hidden text-center text-gray-500 py-16">
                <p class="text-lg">No movies found fitting those criteria.</p>
            </div>
        </section>
    </main>

    <script>
        // DOM elements
        const authBtn = document.getElementById('authBtn');
        const loginModal = document.getElementById('loginModal');
        const closeModalBtn = document.getElementById('closeModalBtn');
        const submitLoginBtn = document.getElementById('submitLoginBtn');
        const roleBadge = document.getElementById('roleBadge');
        const adminUploadSection = document.getElementById('adminUploadSection');
        const uploadForm = document.getElementById('uploadForm');
        const videoGrid = document.getElementById('videoGrid');
        const searchBar = document.getElementById('searchBar');
        const genreFilter = document.getElementById('genreFilter');
        const noVideosMessage = document.getElementById('noVideosMessage');

        // State Management
        let isAdmin = false;
        let videoLibrary = [];
        let db = null;
        let objectUrls = []; // Track active temporary video URLs to clear memory leaks

        // Initialize IndexedDB (Crash-Proof database storage)
        const dbName = "CineHubDatabase";
        const request = indexedDB.open(dbName, 1);

        request.onupgradeneeded = function(e) {
            db = e.target.result;
            if (!db.objectStoreNames.contains("movies")) {
                db.createObjectStore("movies", { keyPath: "id" });
            }
        };

        request.onsuccess = function(e) {
            db = e.target.result;
            loadMoviesFromDB();
        };

        request.onerror = function() {
            console.error("Database failed to open");
        };

        function loadMoviesFromDB() {
            const transaction = db.transaction(["movies"], "readonly");
            const store = transaction.objectStore("movies");
            const getAllRequest = store.getAll();

            getAllRequest.onsuccess = function() {
                videoLibrary = getAllRequest.result || [];
                applyFilters();
            };
        }

        // Authentication Event Handlers
        authBtn.addEventListener('click', () => {
            if (isAdmin) {
                isAdmin = false;
                authBtn.innerText = "Admin Login";
                authBtn.className = "bg-indigo-600 hover:bg-indigo-500 text-xs font-medium py-1 px-2.5 rounded transition whitespace-nowrap cursor-pointer shadow-sm";
                roleBadge.innerText = "Guest";
                roleBadge.className = "bg-gray-700 text-[10px] text-gray-400 font-semibold px-2 py-0.5 rounded border border-gray-600 whitespace-nowrap";
                adminUploadSection.classList.add('hidden');
                applyFilters(); 
            } else {
                loginModal.classList.remove('hidden');
            }
        });

        closeModalBtn.addEventListener('click', () => {
            loginModal.classList.add('hidden');
            document.getElementById('loginError').classList.add('hidden');
        });

        submitLoginBtn.addEventListener('click', () => {
            const idInput = document.getElementById('adminId').value;
            const passInput = document.getElementById('adminPassword').value;

            if (idInput === "slot69" && passInput === "slot696969") {
                isAdmin = true;
                loginModal.classList.add('hidden');
                document.getElementById('adminId').value = '';
                document.getElementById('adminPassword').value = '';
                document.getElementById('loginError').classList.add('hidden');
                
                authBtn.innerText = "Log Out";
                authBtn.className = "bg-rose-600 hover:bg-rose-500 text-xs font-medium py-1 px-2.5 rounded transition whitespace-nowrap cursor-pointer shadow-sm";
                roleBadge.innerText = "Admin Access";
                roleBadge.className = "bg-amber-500/20 text-[10px] text-amber-400 font-semibold px-2 py-0.5 rounded border border-amber-500/30 whitespace-nowrap";
                adminUploadSection.classList.remove('hidden');
                applyFilters();
            } else {
                document.getElementById('loginError').classList.remove('hidden');
            }
        });

        // Fast & Safe Video Upload via Raw Blobs
        uploadForm.addEventListener('submit', (e) => {
            e.preventDefault();
            if (!isAdmin) return;

            const nameInput = document.getElementById('videoName');
            const genreInput = document.getElementById('videoGenre');
            const fileInput = document.getElementById('videoFile');
            const file = fileInput.files[0];

            if (!file) return;

            const newMovie = {
                id: Date.now(),
                name: nameInput.value.trim(),
                genre: genreInput.value,
                likes: 0,
                videoBlob: file // Save the raw binary file directly (No memory spike!)
            };

            const transaction = db.transaction(["movies"], "readwrite");
            const store = transaction.objectStore("movies");
            const addRequest = store.add(newMovie);

            addRequest.onsuccess = function() {
                videoLibrary.push(newMovie);
                applyFilters();
                uploadForm.reset();
            };
        });

        searchBar.addEventListener('input', applyFilters);
        genreFilter.addEventListener('change', applyFilters);

        function applyFilters() {
            const searchTerms = searchBar.value.toLowerCase();
            const selectedGenre = genreFilter.value;

            const matches = videoLibrary.filter(movie => {
                const matchSearch = movie.name.toLowerCase().includes(searchTerms);
                const matchGenre = (selectedGenre === 'all') || (movie.genre === selectedGenre);
                return matchSearch && matchGenre;
            });

            renderGallery(matches);
        }

        // Render Cards Matrix securely without memory leakage
        function renderGallery(movies) {
            // Revoke old object URLs to free up system device RAM memory
            objectUrls.forEach(url => URL.revokeObjectURL(url));
            objectUrls = [];

            videoGrid.innerHTML = '';
            
            if (movies.length === 0) {
                noVideosMessage.classList.remove('hidden');
                return;
            }
            noVideosMessage.classList.add('hidden');

            movies.forEach(movie => {
                // Generate a temporary execution pointer stream URL for the video player element
                const videoUrl = URL.createObjectURL(movie.videoBlob);
                objectUrls.push(videoUrl);

                const card = document.createElement('div');
                card.className = "bg-gray-800 rounded-xl overflow-hidden border border-gray-700/70 shadow-xl flex flex-col justify-between";
                
                const adminActionElement = isAdmin 
                    ? `<button onclick="deleteMovie(${movie.id})" class="text-xs text-rose-400 hover:text-rose-300 font-semibold border border-rose-500/30 bg-rose-500/10 px-2.5 py-1 rounded-md transition">Delete Video</button>`
                    : ``;

                card.innerHTML = `
                    <div class="relative aspect-video bg-black">
                        <video src="${videoUrl}" controls class="w-full h-full object-contain"></video>
                        <span class="absolute top-2 left-2 bg-indigo-600/90 text-[10px] uppercase font-bold tracking-wider px-2 py-0.5 rounded shadow">
                            ${movie.genre}
                        </span>
                    </div>
                    <div class="p-4 space-y-3 flex-1 flex flex-col justify-between">
                        <div>
                            <h3 class="font-semibold text-gray-100 text-base mb-2 truncate" title="${movie.name}">${movie.name}</h3>
                        </div>
                        
                        <div class="space-y-3 pt-2 border-t border-gray-700/60">
                            <!-- Interaction Row -->
                            <div class="flex items-center justify-between gap-2">
                                <button onclick="likeMovie(${movie.id})" class="flex items-center gap-1.5 text-xs text-gray-300 hover:text-pink-400 transition bg-gray-700/50 hover:bg-gray-700 px-2.5 py-1.5 rounded-lg border border-gray-600/50">
                                    ❤️ <span class="font-bold">${movie.likes}</span> Likes
                                </button>
                                
                                ${adminActionElement}
                            </div>
                            
                            <!-- Download Block -->
                            <div class="flex items-center gap-2">
                                <select id="res-${movie.id}" class="bg-gray-700 text-xs text-gray-200 rounded px-2 py-1.5 border border-gray-600 focus:outline-none w-full cursor-pointer">
                                    <option value="360p">360p (SD)</option>
                                    <option value="720p">720p (HD)</option>
                                    <option value="1080p">1080p (FHD)</option>
                                </select>
                                <button onclick="downloadMovie(${movie.id})" class="bg-indigo-600/20 text-indigo-400 hover:bg-indigo-600 hover:text-white border border-indigo-500/30 text-xs font-semibold px-3 py-1.5 rounded transition whitespace-nowrap">
                                    ⬇️ Download
                                </button>
                            </div>
                        </div>
                    </div>
                `;
                videoGrid.appendChild(card);
            });
        }

        // Global Operations hooks updated for database records mapping
        window.likeMovie = function(id) {
            const index = videoLibrary.findIndex(m => m.id === id);
            if (index !== -1) {
                videoLibrary[index].likes += 1;
                
                const transaction = db.transaction(["movies"], "readwrite");
                const store = transaction.objectStore("movies");
                store.put(videoLibrary[index]);
                
                applyFilters();
            }
        };

        window.deleteMovie = function(id) {
            if (!isAdmin) return;
            
            const transaction = db.transaction(["movies"], "readwrite");
            const store = transaction.objectStore("movies");
            const deleteRequest = store.delete(id);

            deleteRequest.onsuccess = function() {
                videoLibrary = videoLibrary.filter(m => m.id !== id);
                applyFilters();
            };
        };

        window.downloadMovie = function(id) {
            const movie = videoLibrary.find(m => m.id === id);
            if (!movie) return;

            const targetSelect = document.getElementById(`res-${id}`);
            const selectedResolution = targetSelect ? targetSelect.value : "720p";

            const downloadUrl = URL.createObjectURL(movie.videoBlob);
            const downloadAnchor = document.createElement('a');
            downloadAnchor.href = downloadUrl;
            downloadAnchor.download = `${movie.name.replace(/\s+/g, '_')}_[${selectedResolution}].mp4`;
            document.body.appendChild(downloadAnchor);
            downloadAnchor.click();
            document.body.removeChild(downloadAnchor);
            
            // Instantly clear memory link pointer reference allocation
            setTimeout(() => URL.revokeObjectURL(downloadUrl), 100);
        };
    </script>
</body>
</html>
